<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFL 2026 Tech Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
      body { 
        font-family: 'Montserrat', sans-serif; 
        background-color: #0A0A0A; 
        color: #FFFFFF; 
        margin: 0; 
        overflow-x: hidden; 
      }
      .bg-brand-primary { background-color: #1D5DF3; }
      .bg-brand-tint { background-color: #5355CE; }
      .bg-brand-mono-light { background-color: #EEEEEE; }
      .text-brand-mono-dark { color: #0A0A0A; }
      
      .brand-breadcrumb {
        font-size: 12px; 
        font-weight: 700;
        line-height: 1;
        letter-spacing: normal;
        color: #0A0A0A;
      }
      .brand-headline {
        font-size: 32px; 
        font-weight: 700;
        line-height: 1;
        letter-spacing: normal;
        color: #0A0A0A;
      }
      .brand-body-short {
        font-size: 14.6px; 
        font-weight: 700;
        line-height: 1;
        letter-spacing: normal;
        color: #0A0A0A;
      }
      .custom-scrollbar::-webkit-scrollbar { width: 6px; }
      .custom-scrollbar::-webkit-scrollbar-thumb { background: #5355CE; border-radius: 10px; }
    </style>
  </head>
  <body class="custom-scrollbar">
    
    <div id="main-hub-view" class="min-h-screen flex flex-col">
      <header class="bg-slate-900 border-b border-slate-800 p-4 sticky top-0 z-50 flex justify-between items-center shadow-2xl">
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 bg-brand-primary rounded-xl flex items-center justify-center font-black shadow-lg text-white text-sm">FTT</div>
          <div>
            <h1 class="text-sm font-black uppercase tracking-tighter text-white">NFL 2026 Tech Hub</h1>
            <p class="text-[9px] text-[#5355CE] font-bold tracking-widest uppercase">Sony Sports Command</p>
          </div>
        </div>
        <div class="flex bg-slate-800 rounded-lg p-1">
          <button id="view-tech-btn" class="px-4 py-1.5 rounded-md text-[10px] font-bold uppercase bg-brand-primary text-white shadow-md">Tech Guarantee</button>
          <button id="view-admin-btn" class="px-4 py-1.5 rounded-md text-[10px] font-bold uppercase text-slate-400 hover:text-white">Admin</button>
        </div>
      </header>

      <main class="max-w-3xl mx-auto w-full p-6 space-y-8 flex-grow">
        <div id="moderator-toolbar" class="hidden flex gap-3 mb-8">
          <button id="launch-dashboard-btn" class="flex-1 bg-slate-900 border border-slate-800 hover:border-blue-500 py-6 rounded-3xl flex flex-col items-center justify-center gap-3 transition-all group shadow-xl">
            <div class="w-10 h-10 rounded-2xl bg-blue-600/10 flex items-center justify-center text-blue-500 group-hover:bg-brand-primary group-hover:text-white transition-all text-xl">📺</div>
            <span class="text-[10px] font-bold uppercase tracking-[0.2em] text-slate-400 group-hover:text-white">Review Board Mode</span>
          </button>
          <button id="master-clear-btn" class="flex-1 bg-slate-900 border border-slate-800 hover:border-red-500 py-6 rounded-3xl flex flex-col items-center justify-center gap-3 transition-all group shadow-xl">
            <div class="w-10 h-10 rounded-2xl bg-red-600/10 flex items-center justify-center text-red-500 group-hover:bg-red-600 group-hover:text-white transition-all text-xl">📋</div>
            <span class="text-[10px] font-bold uppercase tracking-[0.2em] text-slate-400 group-hover:text-white">Reset Field Data</span>
          </button>
        </div>

        <div id="submission-card" class="bg-brand-mono-light rounded-[2.5rem] p-8 shadow-2xl space-y-6">
          <div class="relative w-full rounded-3xl overflow-hidden bg-[#0A0A0A] h-36 flex items-center justify-between p-8 shadow-inner border border-slate-800">
            <div class="absolute inset-0 bg-gradient-to-r from-[#0A0A0A] via-[#111111] to-[#0A0A0A]"></div>
            <div class="relative z-10 space-y-1">
              <span class="brand-breadcrumb uppercase tracking-widest block text-white/70">Sony Sports • Command Node</span>
              <h2 class="brand-headline uppercase text-white leading-none">FTT Q&A</h2>
            </div>
            <div class="absolute right-0 top-0 bottom-0 h-full w-1/2 pointer-events-none z-0">
              <img src="assets/Hawkeye-TW-Cover_1500x500_WIP4.png" alt="Hawkeye Branding Logo" class="w-full h-full object-cover object-right opacity-80" />
            </div>
          </div>

          <p class="brand-body-short">Enter parameters below to update the live review matrix.</p>
          
          <form id="qa-form" class="space-y-4">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
              <div class="space-y-1">
                <label class="text-[10px] font-bold text-slate-700 uppercase ml-2 tracking-wider">TG Name</label>
                <input id="tech-name" required placeholder="Full Name" class="w-full bg-white text-slate-900 rounded-2xl px-5 py-3 text-sm outline-none focus:ring-2 focus:ring-[#1D5DF3] border border-slate-300 shadow-inner" />
              </div>
              <div class="space-y-1">
                <label class="text-[10px] font-bold text-slate-700 uppercase ml-2 tracking-wider">Target Session Block</label>
                <select id="tech-session" class="w-full bg-white text-slate-900 rounded-2xl px-5 py-3 text-sm outline-none border border-slate-300 shadow-inner appearance-none">
                  <option value="Day 1">Day 1</option>
                  <option value="Day 2">Day 2</option>
                </select>
              </div>
            </div>

            <div class="space-y-1">
              <label class="text-[10px] font-bold text-slate-700 uppercase ml-2 tracking-wider">Topic Classification</label>
              <select id="tech-topic" class="w-full bg-white text-slate-900 rounded-2xl px-5 py-3 text-sm outline-none border border-slate-300 shadow-inner appearance-none">
                <option value="Replay">Replay</option>
                <option value="Tracking">Tracking</option>
                <option value="Admin/Other">Admin/Other</option>
              </select>
            </div>

            <div class="space-y-1">
              <label class="text-[10px] font-bold text-slate-700 uppercase ml-2 tracking-wider">Query: Question</label>
              <textarea id="tech-question" required placeholder="State operational conditions clearly..." rows="3" class="w-full bg-white text-slate-900 rounded-2xl px-5 py-4 text-sm outline-none focus:ring-2 focus:ring-[#1D5DF3] border border-slate-300 shadow-inner"></textarea>
            </div>
            
            <button type="submit" id="submit-btn" class="w-full bg-brand-primary hover:bg-[#1546b8] text-white font-bold py-4 rounded-2xl uppercase text-xs tracking-widest transition-all shadow-lg shadow-blue-500/20">Send to Command</button>
            <p id="status-msg" class="text-center text-[10px] font-bold uppercase text-emerald-600 tracking-widest hidden"></p>
          </form>
        </div>

        <div id="pinned-faq-zone" class="hidden space-y-4 bg-slate-900/60 border border-brand-primary/20 rounded-[2rem] p-6">
          <div class="flex items-center gap-2 border-b border-slate-800 pb-2">
            <span class="text-lg">📌</span>
            <h2 class="text-xs font-bold uppercase text-brand-primary tracking-widest">Pinned Playbook FAQs (Season Directives)</h2>
          </div>
          <div id="pinned-container" class="grid gap-4"></div>
        </div>

        <div class="space-y-6">
          <div class="flex justify-between items-center border-b border-slate-800 pb-4">
            <h2 class="text-xs font-bold uppercase text-slate-500 tracking-widest flex items-center gap-2">
              <span class="w-2 h-2 bg-brand-primary rounded-full animate-pulse"></span>
              Active Field Logs (<span id="queue-count">0</span>)
            </h2>
          </div>
          <div id="queue-container" class="grid gap-5"></div>
        </div>
      </main>

      <footer class="p-12 text-center opacity-30 border-t border-slate-900 bg-slate-950">
        <p class="text-[9px] font-bold tracking-[0.4em] uppercase text-slate-400">Sony Sports Group • NFL Training Infrastructure</p>
      </footer>
    </div>

    <div id="dashboard-view" class="hidden min-h-screen dashboard-bg flex flex-col items-center justify-center p-12 text-center relative overflow-hidden">
      <button id="exit-dashboard-btn" class="absolute top-8 right-8 text-slate-500 hover:text-slate-300 text-[10px] font-bold uppercase tracking-widest">Exit Review Board</button>
      <div id="dashboard-content" class="max-w-6xl w-full space-y-12 z-10"></div>
      <div class="absolute bottom-12 left-1/2 -translate-x-1/2 opacity-20">
         <p class="text-[10px] font-bold tracking-[1.2em] uppercase text-white">Sony Sports • NFL Training Command</p>
      </div>
    </div>

    <script>
      const firebaseConfig = {
        apiKey: "AIzaSyAeN_NiZC57eHDcU9pZcsmV6ka7UYOHZdE",
        authDomain: "nfl-tech-training-2026.firebaseapp.com",
        projectId: "nfl-tech-training-2026",
        storageBucket: "nfl-tech-training-2026.firebasestorage.app",
        messagingSenderId: "1078301503876",
        appId: "1:1078301503876:web:7ddb463a6e2f33c2e2add1",
        measurementId: "G-YPG7QLKGKM"
      };

      firebase.initializeApp(firebaseConfig);
      const db = firebase.firestore();
      
      let currentQuestions = [];
      let isModeratorMode = false;
      const ADMIN_PASSWORD = "nfl2026admin";

      const form = document.getElementById('qa-form');
      const container = document.getElementById('queue-container');
      const pinnedContainer = document.getElementById('pinned-container');
      const pinnedZone = document.getElementById('pinned-faq-zone');
      const countLabel = document.getElementById('queue-count');
      const statusMsg = document.getElementById('status-msg');
      const modToolbar = document.getElementById('moderator-toolbar');
      
      const mainHubView = document.getElementById('main-hub-view');
      const dashboardView = document.getElementById('dashboard-view');
      const dashboardContent = document.getElementById('dashboard-content');
      const nameInputEl = document.getElementById('tech-name');

      const rememberedName = localStorage.getItem('nfl_saved_tech_name');
      if (rememberedName) {
        nameInputEl.value = rememberedName;
      }

      nameInputEl.addEventListener('input', (e) => {
        localStorage.setItem('nfl_saved_tech_name', e.target.value);
      });

      db.collection("questions")
        .orderBy("rawTimestamp", "desc")
        .onSnapshot((snapshot) => {
          currentQuestions = [];
          snapshot.forEach((doc) => {
            currentQuestions.push({ id: doc.id, ...doc.data() });
          });
          renderQueue();
          renderDashboard();
        }, (error) => {
          console.error("Firestore stream error:", error);
        });

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const submitBtn = document.getElementById('submit-btn');
        const nameInput = nameInputEl.value;
        const sessionInput = document.getElementById('tech-session').value;
        const topicInput = document.getElementById('tech-topic').value;
        const questionInput = document.getElementById('tech-question').value;

        submitBtn.disabled = true;
        submitBtn.innerText = "TRANSMITTING...";
        
        try {
          const now = new Date();
          const timestampStr = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

          await db.collection("questions").add({
            author: nameInput || 'Anonymous Tech',
            session: sessionInput,
            topic: topicInput,
            text: questionInput,
            timestamp: timestampStr,
            rawTimestamp: now.getTime(),
            status: 'pending',
            answer: '',
            upvotes: 0,
            syncedToSheet: false
          });

          document.getElementById('tech-question').value = '';
          statusMsg.innerText = "Success! Sent to Command Center.";
          statusMsg.classList.remove('hidden');
          setTimeout(() => statusMsg.classList.add('hidden'), 5000);
        } catch (err) {
          console.error(err);
          alert("Error sending submission to cloud storage.");
        } finally {
          submitBtn.disabled = false;
          submitBtn.innerText = "Send to Command";
        }
      });

      // FEATURE 2: REALTIME UPVOTE RUNTIME INCREMENTOR
      window.upvoteQuestion = async function(id, currentVotes) {
        const upvoteButton = document.getElementById(`upvote-btn-${id}`);
        // Visual protection filter block to prevent double spamming inputs
        if (localStorage.getItem(`upvoted_${id}`)) {
          alert("You have already synced an agreement verification vote to this entry track.");
          return;
        }
        
        try {
          if (upvoteButton) upvoteButton.disabled = true;
          await db.collection("questions").doc(id).update({
            upvotes: (currentVotes || 0) + 1
          });
          localStorage.setItem(`upvoted_${id}`, "true");
        } catch (err) {
          console.error("Upvote matrix failed:", err);
        }
      };

      function renderQueue() {
        // Separate Pinned items (answered/resolved) from Live Active items (pending/live)
        const activeItems = currentQuestions.filter(q => q.status === 'pending' || q.status === 'live');
        const pinnedItems = currentQuestions.filter(q => q.status === 'answered');

        countLabel.innerText = activeItems.length;

        // Auto-Sort Active Queue by Upvote Volume Track Count
        activeItems.sort((a, b) => (b.upvotes || 0) - (a.upvotes || 0));

        // Render Pinned Dashboard Component FAQ Frame Block
        if (pinnedItems.length > 0) {
          pinnedZone.classList.remove('hidden');
          pinnedContainer.innerHTML = pinnedItems.map(q => `
            <div class="bg-slate-950 border border-emerald-900/40 rounded-2xl p-5 shadow-lg">
              <div class="flex justify-between items-start mb-2">
                <div>
                  <p class="text-xs font-bold text-slate-300 uppercase">${q.author}</p>
                  <p class="text-[9px] text-emerald-500 font-bold uppercase tracking-wider mt-0.5">${q.session} • ${q.topic}</p>
                </div>
                <span class="text-[9px] font-bold px-2 py-0.5 rounded bg-emerald-500/10 text-emerald-400 uppercase tracking-widest">PINNED DIRECTIVE</span>
              </div>
              <p class="text-sm text-white italic font-medium my-3">"${q.text}"</p>
              <div class="bg-brand-primary/10 border-l-4 border-brand-primary p-3 rounded-r-xl">
                <p class="text-[9px] font-bold uppercase text-brand-primary mb-1 tracking-widest">Official Season Playbook Response</p>
                <p class="text-sm text-slate-200 leading-relaxed">${q.answer || 'Resolved by instructor.'}</p>
              </div>
            </div>
          `).join('');
        } else {
          pinnedZone.classList.add('hidden');
        }

        // Render Primary Active Timeline
        if (activeItems.length === 0) {
          container.innerHTML = `
            <div class="text-center py-20 border-2 border-dashed border-slate-800 rounded-[2.5rem] opacity-20">
              <p class="text-xs font-bold uppercase tracking-[0.3em]">Channel Clear • No Active Queries</p>
            </div>`;
          return;
        }

        container.innerHTML = activeItems.map(q => {
          let liveStyle = q.status === 'live' ? 'border-[#1D5DF3] ring-4 ring-[#1D5DF3]/20' : 'border-slate-800 hover:border-slate-700';
          let badgeStyle = q.status === 'live' ? 'bg-red-600 text-white animate-pulse' : 'bg-slate-800 text-slate-500';
          let hasUpvoted = localStorage.getItem(`upvoted_${q.id}`);
          let voteBtnStyle = hasUpvoted ? 'bg-brand-tint/20 text-brand-tint border-brand-tint/40' : 'bg-slate-800 text-slate-300 hover:bg-brand-tint border-slate-700';
          
          return `
            <div class="bg-slate-900 border rounded-[2rem] p-6 transition-all shadow-xl ${liveStyle}">
              <div class="flex justify-between items-start mb-4">
                <div class="flex items-center gap-3">
                  <div class="w-10 h-10 bg-slate-800 rounded-xl flex items-center justify-center text-xs font-bold text-[#1D5DF3] border border-slate-700 uppercase">${q.author.charAt(0)}</div>
                  <div>
                    <p class="text-sm font-bold text-slate-200 uppercase tracking-tight leading-tight">${q.author}</p>
                    <p class="text-[9px] text-[#5355CE] font-bold uppercase tracking-widest mt-1">${q.session || 'General'} • ${q.topic} • ${q.timestamp}</p>
                  </div>
                </div>
                
                <button id="upvote-btn-${q.id}" onclick="upvoteQuestion('${q.id}', ${q.upvotes || 0})" class="flex items-center gap-1.5 px-3 py-1.5 border rounded-full text-[10px] font-bold uppercase tracking-wider transition-all shadow-sm ${voteBtnStyle}">
                  <span>▲</span> Agree (${q.upvotes || 0})
                </button>
              </div>
              <p class="text-sm text-white font-medium italic mb-6 leading-relaxed">"${q.text}"</p>
              
              ${isModeratorMode ? `
                <div class="grid grid-cols-3 gap-2 mt-4 pt-4 border-t border-slate-800/50">
                  <button onclick="deployLive('${q.id}')" class="py-2 rounded-xl text-[9px] font-bold uppercase tracking-widest transition-all ${q.status === 'live' ? 'bg-brand-primary text-white' : 'bg-slate-800 text-slate-400 hover:bg-brand-primary hover:text-white'}">Deploy Live</button>
                  <button onclick="resolveLive('${q.id}')" class="py-2 rounded-xl text-[9px] font-bold uppercase tracking-widest bg-slate-800 text-slate-400 hover:bg-emerald-600 hover:text-white transition-all">Pin Archive</button>
                  <button onclick="respondLive('${q.id}')" class="py-2 rounded-xl text-[9px] font-bold uppercase tracking-widest bg-slate-800 text-slate-400 hover:bg-brand-tint hover:text-white transition-all">Respond & Pin</button>
                </div>` : ''}
            </div>`;
        }).join('');
      }

      function renderDashboard() {
        const liveQ = currentQuestions.find(q => q.status === 'live');
        if (!liveQ) {
          dashboardContent.innerHTML = `
            <div class="space-y-6 opacity-30">
              <div class="w-32 h-32 bg-slate-800 rounded-[2.5rem] mx-auto animate-pulse flex items-center justify-center text-4xl">🏈</div>
              <h1 class="text-5xl font-bold uppercase tracking-tighter text-white">Huddle Up • Awaiting Selection</h1>
              <p class="text-slate-500 uppercase tracking-[0.6em] font-bold text-sm">Admin Playbook Sync Active</p>
            </div>`;
        } else {
          dashboardContent.innerHTML = `
            <div class="space-y-12">
              <div class="inline-block px-8 py-3 bg-brand-primary rounded-full text-[11px] font-bold uppercase tracking-[0.4em] shadow-2xl shadow-blue-600/40 mb-6">Live Broadcast</div>
              <h2 class="text-7xl font-bold leading-[1.05] tracking-tight text-white drop-shadow-2xl">"${liveQ.text}"</h2>
              <div class="flex items-center justify-center gap-12 pt-16 border-t border-slate-800/50">
                <div class="text-left">
                  <p class="text-[11px] font-bold text-[#1D5DF3] uppercase tracking-widest mb-2">Tech Guarantee</p>
                  <p class="text-4xl font-bold uppercase text-white">${liveQ.author}</p>
                </div>
                <div class="w-px h-20 bg-slate-800"></div>
                <div class="text-left">
                  <p class="text-[11px] font-bold text-slate-500 uppercase tracking-widest mb-2">Session Block & Topic</p>
                  <p class="text-4xl font-bold uppercase text-slate-300">${liveQ.session || 'General'} • ${liveQ.topic}</p>
                </div>
              </div>
            </div>`;
        }
      }

      window.deployLive = async function(id) {
        const batch = db.batch();
        currentQuestions.forEach((q) => {
          if (q.status === 'live') {
            batch.update(db.collection("questions").doc(q.id), { status: 'pending' });
          }
        });
        batch.update(db.collection("questions").doc(id), { status: 'live' });
        await batch.commit();
      };

      window.resolveLive = async function(id) {
        await db.collection("questions").doc(id).update({ status: 'answered' });
      };

      window.respondLive = async function(id) {
        const ans = prompt("Official Admin Response (Pins directly into Playbook FAQ deck):");
        if (ans) {
          await db.collection("questions").doc(id).update({ answer: ans, status: 'answered' });
        }
      };

      document.getElementById('master-clear-btn').addEventListener('click', async () => {
        if (!confirm("Confirm wiping entire real-time log stack?")) return;
        const snapshot = await db.collection("questions").get();
        const batch = db.batch();
        snapshot.forEach(doc => batch.delete(doc.ref));
        await batch.commit();
      });

      document.getElementById('view-tech-btn').addEventListener('click', () => {
        isModeratorMode = false;
        modToolbar.classList.add('hidden');
        document.getElementById('submission-card').classList.remove('hidden');
        document.getElementById('view-tech-btn').className = "px-4 py-1.5 rounded-md text-[10px] font-bold uppercase bg-brand-primary text-white shadow-md";
        document.getElementById('view-admin-btn').className = "px-4 py-1.5 rounded-md text-[10px] font-bold uppercase text-slate-400 hover:text-white";
        renderQueue();
      });

      document.getElementById('view-admin-btn').addEventListener('click', () => {
        if (isModeratorMode) return;
        const pass = prompt("Enter Admin Authorization Code:");
        if (pass === ADMIN_PASSWORD) {
          isModeratorMode = true;
          modToolbar.classList.remove('hidden');
          document.getElementById('submission-card').classList.add('hidden');
          document.getElementById('view-admin-btn').className = "px-4 py-1.5 rounded-md text-[10px] font-bold uppercase bg-brand-tint text-white shadow-md";
          document.getElementById('view-tech-btn').className = "px-4 py-1.5 rounded-md text-[10px] font-bold uppercase text-slate-400 hover:text-white";
          renderQueue();
        } else if (pass !== null) {
          alert("Incorrect security PIN credentials.");
        }
      });

      document.getElementById('launch-dashboard-btn').addEventListener('click', () => {
        mainHubView.classList.add('hidden');
        dashboardView.classList.remove('hidden');
      });

      document.getElementById('exit-dashboard-btn').addEventListener('click', () => {
        dashboardView.classList.add('hidden');
        mainHubView.classList.remove('hidden');
      });
    </script>
  </body>
</html>
