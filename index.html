<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFL 2026 Tech Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&family=Poppins:wght@700;900&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
      body { font-family: 'Inter', sans-serif; background-color: #020617; color: #f8fafc; margin: 0; overflow-x: hidden; }
      .title-font { font-family: 'Poppins', sans-serif; }
      .dashboard-bg { background: radial-gradient(circle at top right, #1e1b4b 0%, #020617 100%); }
      .custom-scrollbar::-webkit-scrollbar { width: 5px; }
      .custom-scrollbar::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
    </style>
  </head>
  <body class="custom-scrollbar">
    
    <div id="main-hub-view" class="min-h-screen flex flex-col">
      <header class="bg-slate-900 border-b border-slate-800 p-4 sticky top-0 z-50 flex justify-between items-center shadow-2xl">
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 bg-blue-600 rounded-lg flex items-center justify-center font-black title-font shadow-lg">NFL</div>
          <div>
            <h1 class="text-sm font-black uppercase tracking-tighter title-font">NFL 2026 Tech Hub</h1>
          </div>
        </div>
        <div class="flex bg-slate-800 rounded-lg p-1">
          <button id="view-tech-btn" class="px-4 py-1.5 rounded-md text-[10px] font-black uppercase bg-blue-600 text-white shadow-md">Tech Guarantee</button>
          <button id="view-admin-btn" class="px-4 py-1.5 rounded-md text-[10px] font-black uppercase text-slate-400 hover:text-white">Admin</button>
        </div>
      </header>

      <main class="max-w-3xl mx-auto w-full p-6 space-y-8 flex-grow">
        <div id="moderator-toolbar" class="hidden flex gap-3 mb-8">
          <button id="launch-dashboard-btn" class="flex-1 bg-slate-900 border border-slate-800 hover:border-blue-500 py-6 rounded-3xl flex flex-col items-center justify-center gap-3 transition-all group shadow-xl">
            <div class="w-10 h-10 rounded-2xl bg-blue-600/10 flex items-center justify-center text-blue-500 group-hover:bg-blue-600 group-hover:text-white transition-all text-xl">📺</div>
            <span class="text-[10px] font-black uppercase tracking-[0.2em]">Review Board Mode</span>
          </button>
          <button id="master-clear-btn" class="flex-1 bg-slate-900 border border-slate-800 hover:border-red-500 py-6 rounded-3xl flex flex-col items-center justify-center gap-3 transition-all group shadow-xl">
            <div class="w-10 h-10 rounded-2xl bg-red-600/10 flex items-center justify-center text-red-500 group-hover:bg-red-600 group-hover:text-white transition-all text-xl">📋</div>
            <span class="text-[10px] font-black uppercase tracking-[0.2em]">Reset Field Data</span>
          </button>
        </div>

        <div id="submission-card" class="bg-slate-900 rounded-[2.5rem] p-8 border border-slate-800 shadow-2xl space-y-6">
          <div>
            <h2 class="text-base font-black uppercase text-blue-500 tracking-widest mb-1">FTT Q&A</h2>
            <p class="text-slate-500 text-[10px] uppercase font-bold tracking-tighter leading-tight">Enter your parameters below to update the live command board.</p>
          </div>
          <form id="qa-form" class="space-y-4">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
              <div class="space-y-1">
                <label class="text-[9px] font-black text-slate-600 uppercase ml-2 tracking-widest">TG Name</label>
                <input id="tech-name" required placeholder="Full Name (Company/Team)" class="w-full bg-slate-800 border border-slate-700 rounded-2xl px-5 py-3 text-sm text-white outline-none focus:ring-2 focus:ring-blue-500 transition-all" />
              </div>
              <div class="space-y-1">
                <label class="text-[9px] font-black text-slate-600 uppercase ml-2 tracking-widest">Target Session Block</label>
                <select id="tech-session" class="w-full bg-slate-800 border border-slate-700 rounded-2xl px-5 py-3 text-sm text-white outline-none appearance-none">
                  <option value="Day 1">Day 1</option>
                  <option value="Day 2">Day 2</option>
                </select>
              </div>
            </div>

            <div class="space-y-1">
              <label class="text-[9px] font-black text-slate-600 uppercase ml-2 tracking-widest">Topic Classification</label>
              <select id="tech-topic" class="w-full bg-slate-800 border border-slate-700 rounded-2xl px-5 py-3 text-sm text-white outline-none appearance-none">
                <option value="Replay">Replay</option>
                <option value="Tracking">Tracking</option>
                <option value="Admin/Other">Admin/Other</option>
              </select>
            </div>

            <div class="space-y-1">
              <label class="text-[9px] font-black text-slate-600 uppercase ml-2 tracking-widest">Query: Question</label>
              <textarea id="tech-question" required placeholder="State training conditions clearly..." rows="3" class="w-full bg-slate-800 border border-slate-700 rounded-2xl px-5 py-4 text-sm text-white outline-none focus:ring-2 focus:ring-blue-500 transition-all"></textarea>
            </div>
            <button type="submit" id="submit-btn" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-4 rounded-2xl uppercase text-xs tracking-[0.2em] transition-all shadow-lg shadow-blue-600/20">Send to Command</button>
            <p id="status-msg" class="text-center text-[10px] font-black uppercase text-green-500 tracking-widest hidden"></p>
          </form>
        </div>

        <div class="space-y-6">
          <div class="flex justify-between items-center border-b border-slate-800 pb-4">
            <h2 class="text-xs font-black uppercase text-slate-500 tracking-widest flex items-center gap-2">
              <span class="w-2 h-2 bg-blue-500 rounded-full animate-pulse"></span>
              Active Field Logs (<span id="queue-count">0</span>)
            </h2>
          </div>
          <div id="queue-container" class="grid gap-5"></div>
        </div>
      </main>

      <footer class="p-12 text-center opacity-20">
        <p class="text-[9px] font-black tracking-[0.6em] uppercase">Sony Sports • NFL Training Command Center</p>
      </footer>
    </div>

    <div id="dashboard-view" class="hidden min-h-screen dashboard-bg flex flex-col items-center justify-center p-12 text-center relative overflow-hidden">
      <button id="exit-dashboard-btn" class="absolute top-8 right-8 text-slate-700 hover:text-slate-400 text-[10px] font-black uppercase tracking-widest">Exit Review Board</button>
      <div id="dashboard-content" class="max-w-6xl w-full space-y-12 z-10"></div>
      <div class="absolute bottom-12 left-1/2 -translate-x-1/2 opacity-20">
         <p class="text-[10px] font-black tracking-[1.2em] uppercase">Sony Sports • NFL Training Command</p>
      </div>
    </div>

    <script>
      const firebaseConfig = {
        apiKey: "AIzaSyAeN_NiZC57eHDcU9pZcsmV6ka7UYOHZdE",
        authDomain: "nfl-tech-training-2026.firebaseapp.com",
        projectId: "nfl-tech-training-2026",
        storageBucket: "nfl-tech-training-2026.firebasestorage.app",
        messagingSenderId: "1078301503876",
        appId: "1:1078301503876:web:7ddb463a6e2f33c2e2add1",
        measurementId: "G-YPG7QLKGKM"
      };

      firebase.initializeApp(firebaseConfig);
      const db = firebase.firestore();
      
      let currentQuestions = [];
      let isModeratorMode = false;
      const ADMIN_PASSWORD = "nfl2026admin";

      const form = document.getElementById('qa-form');
      const container = document.getElementById('queue-container');
      const countLabel = document.getElementById('queue-count');
      const statusMsg = document.getElementById('status-msg');
      const modToolbar = document.getElementById('moderator-toolbar');
      
      const mainHubView = document.getElementById('main-hub-view');
      const dashboardView = document.getElementById('dashboard-view');
      const dashboardContent = document.getElementById('dashboard-content');
      const nameInputEl = document.getElementById('tech-name');

      // Recover name from local cache
      const rememberedName = localStorage.getItem('nfl_saved_tech_name');
      if (rememberedName) {
        nameInputEl.value = rememberedName;
      }

      nameInputEl.addEventListener('input', (e) => {
        localStorage.setItem('nfl_saved_tech_name', e.target.value);
      });

      // Stream Listener Connection
      db.collection("questions")
        .orderBy("rawTimestamp", "desc")
        .onSnapshot((snapshot) => {
          currentQuestions = [];
          snapshot.forEach((doc) => {
            currentQuestions.push({ id: doc.id, ...doc.data() });
          });
          renderQueue();
          renderDashboard();
        }, (error) => {
          console.error("Firestore stream error:", error);
        });

      // Form Processing Action
      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const submitBtn = document.getElementById('submit-btn');
        const nameInput = nameInputEl.value;
        const sessionInput = document.getElementById('tech-session').value;
        const topicInput = document.getElementById('tech-topic').value;
        const questionInput = document.getElementById('tech-question').value;

        submitBtn.disabled = true;
        submitBtn.innerText = "TRANSMITTING...";
        
        try {
          const now = new Date();
          const timestampStr = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

          await db.collection("questions").add({
            author: nameInput || 'Anonymous Tech',
            session: sessionInput,
            topic: topicInput,
            text: questionInput,
            timestamp: timestampStr,
            rawTimestamp: now.getTime(),
            status: 'pending',
            answer: '',
            syncedToSheet: false
          });

          document.getElementById('tech-question').value = '';
          statusMsg.innerText = "Success! Sent to Command Center.";
          statusMsg.classList.remove('hidden');
          setTimeout(() => statusMsg.classList.add('hidden'), 5000);
        } catch (err) {
          console.error(err);
          alert("Error sending submission to cloud storage.");
        } finally {
          submitBtn.disabled = false;
          submitBtn.innerText = "Send to Command";
        }
      });

      function renderQueue() {
        countLabel.innerText = currentQuestions.length;
        if (currentQuestions.length === 0) {
          container.innerHTML = `
            <div class="text-center py-20 border-2 border-dashed border-slate-800 rounded-[2.5rem] opacity-20">
              <p class="text-xs font-black uppercase tracking-[0.3em]">Channel Clear • No Log Entries</p>
            </div>`;
          return;
        }

        container.innerHTML = currentQuestions.map(q => {
          let liveStyle = q.status === 'live' ? 'border-red-600 ring-2 ring-red-600/20' : 'border-slate-800 hover:border-slate-700';
          let badgeStyle = q.status === 'live' ? 'bg-red-600 text-white animate-pulse' : q.status === 'answered' ? 'bg-green-600/20 text-green-500' : 'bg-slate-800 text-slate-500';
          
          return `
            <div class="bg-slate-900 border rounded-[2rem] p-6 transition-all shadow-xl ${liveStyle}">
              <div class="flex justify-between items-start mb-4">
                <div class="flex items-center gap-3">
                  <div class="w-10 h-10 bg-slate-800 rounded-xl flex items-center justify-center text-xs font-black text-blue-400 border border-slate-700 uppercase">${q.author.charAt(0)}</div>
                  <div>
                    <p class="text-sm font-black text-slate-200 uppercase tracking-tight leading-tight">${q.author}</p>
                    <p class="text-[9px] text-blue-500 font-black uppercase tracking-widest mt-1">${q.session || 'General'} • ${q.topic} • ${q.timestamp}</p>
                  </div>
                </div>
                <span class="text-[9px] font-black px-3 py-1 rounded-full uppercase tracking-tighter ${badgeStyle}">${q.status}</span>
              </div>
              <p class="text-sm text-white font-medium italic mb-6 leading-relaxed">"${q.text}"</p>
              ${q.answer ? `
                <div class="bg-blue-600/5 border-l-4 border-blue-600 p-4 rounded-r-2xl mb-2">
                  <p class="text-[9px] font-black uppercase text-blue-400 mb-1 tracking-widest">Official Admin Response</p>
                  <p class="text-sm text-slate-300 leading-relaxed">${q.answer}</p>
                </div>` : ''}
              ${isModeratorMode ? `
                <div class="grid grid-cols-3 gap-2 mt-4 pt-4 border-t border-slate-800/50">
                  <button onclick="deployLive('${q.id}')" class="py-2 rounded-xl text-[9px] font-black uppercase tracking-widest transition-all ${q.status === 'live' ? 'bg-red-600 text-white' : 'bg-slate-800 text-slate-400 hover:bg-red-600 hover:text-white'}">Deploy Live</button>
                  <button onclick="resolveLive('${q.id}')" class="py-2 rounded-xl text-[9px] font-black uppercase tracking-widest bg-slate-800 text-slate-400 hover:bg-green-600 hover:text-white transition-all">Resolve</button>
                  <button onclick="respondLive('${q.id}')" class="py-2 rounded-xl text-[9px] font-black uppercase tracking-widest bg-slate-800 text-slate-400 hover:bg-blue-600 hover:text-white transition-all">Respond</button>
                </div>` : ''}
            </div>`;
        }).join('');
      }

      function renderDashboard() {
        const liveQ = currentQuestions.find(q => q.status === 'live');
        if (!liveQ) {
          dashboardContent.innerHTML = `
            <div class="space-y-6 opacity-30">
              <div class="w-32 h-32 bg-slate-800 rounded-[2.5rem] mx-auto animate-pulse flex items-center justify-center text-4xl">🏈</div>
              <h1 class="text-5xl font-black uppercase tracking-tighter title-font">Huddle Up • Awaiting Selection</h1>
              <p class="text-slate-500 uppercase tracking-[0.6em] font-bold text-sm">Admin Playbook Sync Active</p>
            </div>`;
        } else {
          dashboardContent.innerHTML = `
            <div class="space-y-12">
              <div class="inline-block px-8 py-3 bg-red-600 rounded-full text-[11px] font-black uppercase tracking-[0.4em] shadow-2xl shadow-red-600/40 mb-6">Live Broadcast</div>
              <h2 class="text-8xl font-black leading-[1.05] title-font tracking-tight text-white drop-shadow-2xl">"${liveQ.text}"</h2>
              <div class="flex items-center justify-center gap-12 pt-16 border-t border-slate-800/50">
                <div class="text-left">
                  <p class="text-[11px] font-black text-blue-500 uppercase tracking-widest mb-2">Tech Guarantee</p>
                  <p class="text-4xl font-black uppercase title-font text-white">${liveQ.author}</p>
                </div>
                <div class="w-px h-20 bg-slate-800"></div>
                <div class="text-left">
                  <p class="text-[11px] font-black text-slate-500 uppercase tracking-widest mb-2">Session Block & Topic</p>
                  <p class="text-4xl font-black uppercase title-font text-slate-300">${liveQ.session || 'General'} • ${liveQ.topic}</p>
                </div>
              </div>
            </div>`;
        }
      }

      window.deployLive = async function(id) {
        const batch = db.batch();
        currentQuestions.forEach((q) => {
          if (q.status === 'live') {
            batch.update(db.collection("questions").doc(q.id), { status: 'pending' });
          }
        });
        batch.update(db.collection("questions").doc(id), { status: 'live' });
        await batch.commit();
      };

      window.resolveLive = async function(id) {
        await db.collection("questions").doc(id).update({ status: 'answered' });
      };

      window.respondLive = async function(id) {
        const ans = prompt("Official Admin Response (Syncs to Board):");
        if (ans) {
          await db.collection("questions").doc(id).update({ answer: ans, status: 'answered' });
        }
      };

      document.getElementById('master-clear-btn').addEventListener('click', async () => {
        if (!confirm("Confirm wiping entire real-time log stack?")) return;
        const snapshot = await db.collection("questions").get();
        const batch = db.batch();
        snapshot.forEach(doc => batch.delete(doc.ref));
        await batch.commit();
      });

      document.getElementById('view-tech-btn').addEventListener('click', () => {
        isModeratorMode = false;
        modToolbar.classList.add('hidden');
        document.getElementById('submission-card').classList.remove('hidden');
        document.getElementById('view-tech-btn').className = "px-4 py-1.5 rounded-md text-[10px] font-black uppercase bg-blue-600 text-white shadow-md";
        document.getElementById('view-admin-btn').className = "px-4 py-1.5 rounded-md text-[10px] font-black uppercase text-slate-400 hover:text-white";
        renderQueue();
      });

      document.getElementById('view-admin-btn').addEventListener('click', () => {
        if (isModeratorMode) return;
        const pass = prompt("Enter Admin Authorization Code:");
        if (pass === ADMIN_PASSWORD) {
          isModeratorMode = true;
          modToolbar.classList.remove('hidden');
          document.getElementById('submission-card').classList.add('hidden');
          document.getElementById('view-admin-btn').className = "px-4 py-1.5 rounded-md text-[10px] font-black uppercase bg-red-600 text-white shadow-md";
          document.getElementById('view-tech-btn').className = "px-4 py-1.5 rounded-md text-[10px] font-black uppercase text-slate-400 hover:text-white";
          renderQueue();
        } else if (pass !== null) {
          alert("Incorrect security PIN credentials.");
        }
      });

      document.getElementById('launch-dashboard-btn').addEventListener('click', () => {
        mainHubView.classList.add('hidden');
        dashboardView.classList.remove('hidden');
      });

      document.getElementById('exit-dashboard-btn').addEventListener('click', () => {
        dashboardView.classList.add('hidden');
        mainHubView.classList.remove('hidden');
      });
    </script>
  </body>
</html>
